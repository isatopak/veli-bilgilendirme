<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Veli Bilgilendirme Sistemi</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --bg-color: #000000; 
            --surface: #1C1C1E; 
            --surface-variant: #2C2C2E; 
            --primary: #0A84FF; 
            --on-primary: #FFFFFF; 
            --success: #30D158; 
            --danger: #FF453A; 
            --warning: #FF9F0A; 
            --info: #5E5CE6; 
            --text-main: #FFFFFF; 
            --text-muted: #EBEBF599; 

            --ios-green-gradient: linear-gradient(135deg, #30D158, #32ADE6);
            --ios-blue-gradient: linear-gradient(135deg, #0A84FF, #5E5CE6);
            --ios-dark-gradient: linear-gradient(135deg, #2C2C2E, #1C1C1E);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; }
        
        .app-header { background-color: rgba(28, 28, 30, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 20px 24px; text-align: center; font-weight: 600; border-bottom: 0.5px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .app-title-modern { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px;}
        
        .container { padding: 16px; }
        
        .glass-panel { background-color: var(--surface); border-radius: 20px; padding: 24px; margin-bottom: 16px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); }
        
        .setup-icon-amblem { font-size: 54px; display: flex; align-items: center; justify-content: center; width: 110px; height: 110px; border-radius: 30px; background: var(--ios-dark-gradient); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); margin: 0 auto 24px auto; }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; }
        input, select { width: 100%; padding: 16px; border-radius: 14px; border: none; background-color: var(--surface-variant); color: var(--text-main); font-size: 16px; outline: none; appearance: none; }
        select { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23EBEBF5%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 16px top 50%; background-size: 12px auto; }
        
        .btn-vista { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--on-primary); background-color: var(--primary); display: flex; justify-content: center; gap: 8px; outline: none; }
        
        .logout-btn { position: absolute; right: 16px; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.08); color: var(--text-main); padding: 8px 14px; border-radius: 100px; border: none; cursor: pointer; text-transform: uppercase; }
        
        #syncStatus { position: absolute; left: 16px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.1); color: #EBEBF5; padding: 6px 12px; border-radius: 100px; display:none; }
        .live-indicator { display: inline-block; width: 8px; height: 8px; background-color: var(--success); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .dashboard-grid-modern { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card-modern { padding: 20px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; border: none; box-shadow: 0 8px 16px rgba(0,0,0,0.15); transition: transform 0.1s; }
        
        .stat-avg { background: var(--ios-green-gradient); color: #FFF; }
        .stat-pnt { background: var(--ios-blue-gradient); color: #FFF; }
        .stat-label-modern { font-size: 13px; font-weight: 600; opacity: 0.9; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value-modern { font-size: 38px; font-weight: 800; margin: 4px 0 0 0; letter-spacing: -1px; }

        .glass-header { font-weight: 600; font-size: 15px; text-align: left; margin-bottom: 12px; margin-top: 24px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .history-list-modern { display: flex; flex-direction: column; gap: 12px; }
        .history-item-modern { background: var(--surface); padding: 18px; border-radius: 18px; text-align: left; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .history-left-modern { display: flex; flex-direction: column; gap: 6px; }
        .history-date-modern { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .history-subject-modern { font-size: 15px; font-weight: 600; color: var(--text-main); word-break: break-word; line-height: 1.4; }
        .history-right-modern { font-size: 22px; display: flex; align-items: center; justify-content: center; min-width: 30px; }

        .assignment-box { padding: 18px; border-radius: 18px; position: relative; box-shadow: 0 8px 16px rgba(0,0,0,0.15); display: flex; flex-direction: column; text-align: left; margin-bottom: 12px;}
        .box-red { background: linear-gradient(135deg, #FF453A, #FF375F); color: #FFF; }
        .box-yellow { background: linear-gradient(135deg, #FFD60A, #FF9F0A); color: #000; }
        .box-date { font-size: 12px; font-weight: 700; opacity: 0.8; display: flex; align-items: center; gap: 6px;}
        .box-class { font-size: 24px; font-weight: 800; margin: 12px 0 6px 0; letter-spacing: -1px;}
        .box-title { font-size: 15px; font-weight: 600; line-height: 1.3; opacity: 0.9; word-break: break-word;}

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-header">
        <span id="syncStatus"></span>
        <span class="app-title-modern">Veli Bilgilendirme Sistemi</span>
        <button id="logoutBtn" class="logout-btn" onclick="logoutParent()" style="display:none;">Çıkış</button>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 600; font-size: 16px;">Sisteme Kaydediliyor...</div>
    </div>

    <div class="container">
        <div id="screen-parent-setup" style="display:block;">
            <div class="glass-panel" style="margin-top:20px;">
                <div class="setup-icon-amblem">📲👤</div>
                <h2 style="margin-top:0; font-size: 24px; letter-spacing:-0.5px;">Cihaz Eşleştirme</h2>
                <p style="color:var(--text-muted); margin-bottom:30px; font-size:14px;">Öğrenciyi seçin ve kendi adınızı girin. Bu cihaz seçilen öğrenci için kilitlenecektir.</p>
                
                <div class="form-group">
                    <label>Sınıf Seçiniz</label>
                    <select id="parentSetupClass" onchange="loadParentSetupStudents()">
                        <option value="" disabled selected>Lütfen Seçin...</option>
                        <option value="5B">5B</option><option value="5C">5C</option><option value="5D">5D</option><option value="5E">5E</option><option value="5YDA">5YDA</option><option value="6A">6A</option><option value="7E">7E</option><option value="TEST">TEST</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Öğrenci Seçiniz</label>
                    <select id="parentSetupStudent" disabled><option value="" disabled selected>Önce sınıf seçin...</option></select>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>Veli Adı ve Soyadı</label>
                    <input type="text" id="parentNameInput" placeholder="Örn: Murat Yılmaz" style="border: 1px solid rgba(255,255,255,0.1);">
                </div>
                <button class="btn-vista" onclick="saveParentSetup()" style="margin-top:24px;"><span style="font-size:18px;">🔗</span> Kaydet ve Bağlan</button>
            </div>
        </div>

        <div id="screen-parent-dashboard" style="display:none;">
            <div id="parentDashboardContainer"></div>
        </div>
    </div>

<script>

        "5D": ["87 - Ayşegül Altunyuva", "116 - Berat Kurubal", "118 - Belinay Sarıbulak", "137 - Derin Mebrule Alper", "187 - Eyüp Arda Karabulut", "222 - Furkan Yakupoğlu", "274 - Resul Güven", "289 - Nazlı Çevik", "291 - Kaan Efe Keten", "360 - Elif Kocaman", "376 - Yusuf Buğra Demirci", "390 - Adanaz Gezer", "414 - Asrın Kurşun", "417 - Ayaz Aksoy", "434 - Devran Çetin", "440 - Ege Özel", "464 - Hümeyra Nas Baloğlu", "466 - Tuana Dundar", "490 - Osman Meral", "493 - Poyraz Karamuk", "498 - Rumeysa Akdemir", "504 - Yağmur Hilal Geçmez", "507 - Zehra Şenses", "541 - Çağrı Karapınar", "543 - Gönül Keleş"],
        "5E": ["52 - Afşin Kuruca", "142 - Ela Nur Yıldız", "159 - Elif İlhan", "165 - Erva Acar", "169 - Eslimnur Kaya", "170 - Esma Çakal", "175 - Turgut Kaplan", "179 - Hira Elif Kartal", "201 - Hasan Etem Kurubal", "210 - Hira Sena Üzel", "269 - Muhammed Miraç Şirin", "278 - Murat Yıldız", "286 - Nasuh Buğra Yılmaz", "299 - Özgün Ada Erol", "313 - Muhammed Eymen Aslan", "319 - Ömer Sefa Gündüz", "328 - Elif Naz Gedik", "333 - Eda Nil Gedik", "357 - Eylül Çalışkan", "388 - Tuğçe Karakaya", "395 - Muhammet Talha Örün", "408 - Ali Kemal Aydoğdu", "421 - Selim Yıldırım", "448 - Elifnaz Akgül", "449 - Talha Karaca", "469 - Kaan Demir", "489 - Neslihan İşcan", "513 - Taha Tatay"],
        "5YDA": ["124 - Berkay Karagöz", "189 - Çınar Ali Demir", "209 - Sevgi Şener", "433 - Derin Somer", "451 - Emir Diler", "216 - Hüseyin Metin Ünlü", "292 - Ömer Toprak Kurubal", "363 - Hüseyin Kayra Demir", "415 - Asya Gökmen", "428 - Buğra Çınar", "475 - Melinay Perçin", "246 - Mehmet Timur Yalçın", "373 - Seyit Ali Şahin", "499 - Semih Şentürk", "501 - Umut Yavaş", "116 - Berat Kurubal", "414 - Asrın Kurşun", "440 - Ege Özel", "466 - Tuana Dündar", "170 - Esma Çakal", "408 - Ali Kemal Aydoğdu", "59 - Ahsen Ece Özbek", "75 - Almira Aydın", "111 - Bengü Kılıç", "153 - Elif İkra Bektaş", "202 - Hilal Erva Kurubal", "312 - Efecan Halitoğulları", "410 - Zehra Karabulut", "422 - Beren Dere", "494 - Poyraz Kartal"],
        "6A": ["2 - Ahmet Ayaz Altıntaş", "4 - Ahmet Dere", "5 - Anıl Ergin Aksoy", "11 - Ayaz Nergiz", "14 - Can Karakaya", "17 - Çınar Yüce", "30 - Derin Eren", "35 - Dilara Aydın", "48 - Ela Nur Özbek", "62 - Ezgi Özenses", "63 - Nas Maya Kurubal", "70 - Rüzgar Can", "73 - Saliha Uysal", "84 - Selen Özdemir", "91 - Umut Bozkurt", "93 - Yiğit Er", "94 - Yusuf Hamza Özbek", "96 - Zeynep Balta", "102 - Zeynep Kalender", "105 - İlkim Nehir Tepe", "107 - Ekin Fırat Koç", "109 - Serin Üzel", "125 - Rüzgar İnan Şık", "126 - Nisa Yağmur Ülker", "127 - Eslem Nisa Altındaş", "140 - Ata Can Özdemir", "147 - Sare Karabulut", "238 - Elif Bahar Ceylan", "370 - Solin Deniz Koçin", "389 - Yusuf Uras Kılıç"],
        "7E": ["34 - Arin Eray Erdoğan", "53 - Mert Ali Balta", "60 - Beyza Gül Kalyon", "69 - Ahmet Ediz Arısoy", "101 - Asenat Aras", "112 - Barış Kazankaya", "161 - Hayrunnisa Toraman", "230 - Muhammed Mahmudov", "247 - Eda Ece Balyemez", "284 - Hafsa Öçal", "340 - Sinem Gül", "341 - Sudenaz Gürsoy", "342 - Sümeyye Kadem Işık", "345 - Tuana Şahin", "348 - Yağız Kaya", "364 - Yusuf Kuzey Özdemir", "365 - Yusuf Özkan Koç", "368 - Tolgahan Paslı", "409 - Efe Mesut Yıldırım", "441 - Dila Taşdemir", "693 - Mustafa Özgür Kütük", "884 - Fadime Eldemir"],
        "TEST": ["999 - Test Öğrencisi"]
    };

    function linkYakalayici(metin) {
        if (!metin) return "";
        var urlRegex = /(https?:\/\/[^\s]+)/g;
        return metin.replace(urlRegex, function(url) {
            return '<br><a href="' + url + '" target="_blank" style="display: inline-block; margin-top: 8px; padding: 6px 12px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: bold;" onclick="event.stopPropagation();">Git 🔗</a>';
        });
    }

    function calculateStreak(className, studentName) {
        let streak = 0;
        for(let i=0; i<savedHistories.length; i++) {
            let r = savedHistories[i];
            if(r.className === className) {
                let asgn = r.assignment || "";
                if(!asgn.includes('EKSİK') && !asgn.includes('MATERYAL')) {
                    let s = r.details.find(x => x.name === studentName);
                    if(s && !s.isAbsent) {
                        if(s.isDone) streak++;
                        else break;
                    }
                }
            }
        }
        return streak;
    }

    window.onload = function() { checkParentStatus(); };

    function checkParentStatus() {
        let pData = localStorage.getItem('parentStudent');
        if (pData) { 
            pData = JSON.parse(pData);
            document.getElementById('screen-parent-setup').style.display = 'none'; 
            document.getElementById('screen-parent-dashboard').style.display = 'block'; 
            document.getElementById('logoutBtn').style.display = 'block';
            startSync(); 
        } 
        else { 
            document.getElementById('screen-parent-setup').style.display = 'block'; 
            document.getElementById('screen-parent-dashboard').style.display = 'none'; 
            document.getElementById('syncStatus').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    }

    function logoutParent() {
        if(confirm("Bağlantıyı kesmek ve bilgilerinizi yeniden girmek istiyor musunuz?")) {
            localStorage.removeItem('parentStudent');
            location.reload();
        }
    }

    // SINIF SEÇİNCE ÖĞRENCİ LİSTESİNİ DOLDURAN DÜZELTİLMİŞ FONKSİYON
    function loadParentSetupStudents() {
        const cls = document.getElementById('parentSetupClass').value; 
        const stuSelect = document.getElementById('parentSetupStudent'); 
        stuSelect.innerHTML = '<option value="" disabled selected>Öğrenci Seçiniz...</option>';
        if(cls && classData[cls]) { 
            classData[cls].forEach(s => { 
                const opt = document.createElement('option'); 
                opt.value = s; 
                opt.text = s; 
                stuSelect.appendChild(opt); 
            }); 
            stuSelect.disabled = false; 
        }
    }
    
    function saveParentSetup() {
        const cls = document.getElementById('parentSetupClass').value; 
        const stu = document.getElementById('parentSetupStudent').value;
        const pName = document.getElementById('parentNameInput').value.trim();

        if(!cls || !stu) return alert("Lütfen sınıf ve öğrenci seçin!");
        if(!pName) return alert("Lütfen veli adını ve soyadını girin!");

        if(confirm("Cihaz " + cls + " sınıfından seçtiğiniz öğrencinin verilerini okumak için kilitlenecektir. Onaylıyor musunuz?")) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            db.ref('odevData/parentConnections').once('value').then((snapshot) => {
                let connections = snapshot.val() || [];
                let exists = connections.find(c => c.className === cls && c.studentName === stu && c.parentName === pName);
                if (!exists) {
                    connections.push({className: cls, studentName: stu, parentName: pName, date: new Date().toLocaleDateString('tr-TR')});
                    db.ref('odevData/parentConnections').set(connections);
                }
                setTimeout(function() { 
                    document.getElementById('loadingOverlay').style.display = 'none';
                    localStorage.setItem('parentStudent', JSON.stringify({className: cls, studentName: stu, parentName: pName})); 
                    checkParentStatus();
                }, 1500);
            }).catch(err => {
                alert("Bağlantı hatası! Lütfen internetinizi kontrol edin.");
                document.getElementById('loadingOverlay').style.display = 'none';
            });
        }
    }

    function startSync() { 
        document.getElementById('syncStatus').style.display = 'inline-block';
        document.getElementById('syncStatus').innerHTML = '<span class="live-indicator"></span>'; 
        
        dbRef.on('value', (snapshot) => {
            if (snapshot.exists()) {
                var data = snapshot.val();
                savedHistories = data.history || []; 
                pendingAssignments = data.pending || []; 
                participationScores = data.scores || {}; 
                
                if (document.getElementById('screen-parent-dashboard').style.display === 'block') {
                    renderParentDashboard(); 
                }
            }
        });
    }

    function renderParentDashboard() {
        let pData = localStorage.getItem('parentStudent'); if(!pData) return; pData = JSON.parse(pData);
        const className = pData.className; const studentName = pData.studentName; const container = document.getElementById('parentDashboardContainer');
        
        let html = ''; let total = 0; let doneCount = 0; let matIssues = 0;

        for(let i=0; i<savedHistories.length; i++) {
            const record = savedHistories[i];
            if(record.className === className) {
                let studentDetail = record.details.find(s => s.name === studentName);
                if (studentDetail) {
                    let asgRaw = record.assignment || "";
                    let isMaterial = asgRaw.includes("EKSİK") || asgRaw.includes("MATERYAL");
                    let asg = linkYakalayici(asgRaw); 
                    
                    if(!isMaterial) { 
                        if(!studentDetail.isAbsent) {
                            total++; 
                            if (studentDetail.isDone) doneCount++; 
                        }
                    } 
                    else if (!studentDetail.isDone) { matIssues++; }
                    
                    if (isMaterial && !studentDetail.isDone) {
                        html += `<div class='history-item-modern' style='border-left: 4px solid var(--danger); background: rgba(255, 69, 58, 0.05);'>
                            <div class='history-left-modern'>
                                <div class='history-date-modern'>${record.date}</div>
                                <div class='history-subject-modern' style='color: var(--danger);'>⚠️ ${asg}</div>
                            </div>
                        </div>`;
                    } else if (!isMaterial) {
                        let borderColor = studentDetail.isAbsent ? 'var(--warning)' : (studentDetail.isDone ? 'var(--success)' : 'var(--danger)'); 
                        let icon = studentDetail.isAbsent ? '➖' : (studentDetail.isDone ? '✅' : '❌');
                        let lbl = studentDetail.isAbsent ? ' <span style="font-size:12px; font-weight:normal; color:var(--warning);">(Devamsız)</span>' : '';
                        
                        html += `<div class='history-item-modern' style='border-left: 4px solid ${borderColor};'>
                            <div class='history-left-modern'>
                                <div class='history-date-modern'>${record.date}</div>
                                <div class='history-subject-modern'>${asg}${lbl}</div>
                            </div>
                            <div class='history-right-modern'>${icon}</div>
                        </div>`;
                    }
                }
            }
        }

        const now = new Date(); const todayStr = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        let pendingHtml = '';
        let pendingCount = 0; let sortedPending = [...pendingAssignments].sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
        
        sortedPending.forEach(p => {
            if (p.className === className) {
                pendingCount++;
                let isTodayOrPast = p.dueDate <= todayStr;
                let boxClass = isTodayOrPast ? 'box-red' : 'box-yellow';
                let icon = isTodayOrPast ? '🚨' : '⏳';
                let dParts = p.dueDate.split('-'); let displayDate = `${dParts[2]}.${dParts[1]}.${dParts[0]}`;
                pendingHtml += `<div class="assignment-box ${boxClass}"><div class="box-date"><span>${icon} ${displayDate}</span></div><div class="box-title">${linkYakalayici(p.assignment)}</div></div>`;
            }
        });
        
        let pendingSection = pendingCount > 0 ? `<div class='glass-header'>📌 Yaklaşan Ödevler</div><div id="homeReminderList">${pendingHtml}</div>` : "";
        const cleanName = studentName.split(' - ').length > 1 ? studentName.split(' - ')[1] : studentName;

        let streak = calculateStreak(className, studentName);
        let streakIcon = streak >= 3 ? `<div style="font-size:14px; font-weight:700; color:var(--warning); margin-top:8px; background:rgba(255, 159, 10, 0.1); display:inline-block; padding:6px 12px; border-radius:100px;">🔥 ${streak} Ödevlik Seri!</div>` : '';

        let pScore = (participationScores[className] && participationScores[className][studentName]) ? participationScores[className][studentName] : 0;

        if (total === 0 && pendingCount === 0 && matIssues === 0 && pScore === 0) { 
            container.innerHTML = `<div style="text-align:center; margin-bottom:20px; padding-top:20px;"><div style="font-size:64px; margin-bottom:10px;">👤</div><h2 style="margin:0; color:var(--text-main); font-size:26px;">${cleanName}</h2><p style="color:var(--primary); margin:6px 0 0 0; font-size:15px; font-weight:600;">${className} Sınıfı</p></div><div class="glass-panel" style="text-align: center; color: var(--text-muted); padding: 40px 20px;">Öğrenciye ait henüz bir kayıt bulunmuyor.</div>`; 
        } else {
            const rate = total === 0 ? 0 : Math.round((doneCount / total) * 100);
            
            let matWarning = matIssues > 0 ? `<div class="glass-panel material-panel-modern"><h3 style="margin:0; color: var(--danger); font-size:15px;">⚠️ DİKKAT: ${matIssues} Adet Materyal Eksiği Var!</h3></div>` : "";
            
            let statsHtml = `
            <div class="dashboard-grid-modern">
                <div class='stat-card-modern stat-avg'>
                    <div class='stat-label-modern'>Ödev Oranı</div>
                    <div class='stat-value-modern'>%${rate}</div>
                </div>
                <div class='stat-card-modern stat-pnt'>
                    <div class='stat-label-modern'>Katılım Puanı</div>
                    <div class='stat-value-modern'>${pScore > 0 ? '+'+pScore : pScore}</div>
                </div>
            </div>`;

            container.innerHTML = `<div style="text-align:center; margin-bottom:30px; padding-top:10px;"><div style="font-size:64px; margin-bottom:10px;">👤</div><h2 style="margin:0; color:var(--text-main); font-size:28px; letter-spacing:-0.5px;">${cleanName}</h2><p style="color:var(--primary); margin:6px 0 0 0; font-size:15px; font-weight:600;">${className} Sınıfı Raporu</p>${streakIcon}</div>${statsHtml}${matWarning}${pendingSection}<div class='glass-header'>✅ Kontrol Geçmişi</div><div class="history-list-modern">${html}</div>`;
        }
    }
</script>
</body>
</html>
